<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="BrewTrade AI">
  <defs>
    <linearGradient id="fav-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4DA8F"/>
      <stop offset="55%" stop-color="#C9A14B"/>
      <stop offset="100%" stop-color="#8A6A22"/>
    </linearGradient>
    <linearGradient id="fav-foam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF6DA"/>
      <stop offset="100%" stop-color="#E6C66B"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0F1115"/>

  <!-- Beer mug body -->
  <rect x="14" y="20" width="28" height="32" rx="4" fill="none" stroke="url(#fav-gold)" stroke-width="3"/>

  <!-- Mug handle -->
  <path d="M42 28 q10 2 10 12 q0 10 -10 12" fill="none" stroke="url(#fav-gold)" stroke-width="3" stroke-linecap="round"/>

  <!-- Foam -->
  <path d="M14 22 q4 -6 8 0 q4 -6 8 0 q4 -6 8 0 v4 h-24 z" fill="url(#fav-foam)"/>

  <!-- Bubbles -->
  <circle cx="22" cy="34" r="1.6" fill="#F4DA8F"/>
  <circle cx="30" cy="40" r="1.6" fill="#F4DA8F"/>
  <circle cx="24" cy="46" r="1.6" fill="#F4DA8F"/>
</svg>
